# A big chunk is a copy of tests.yml.
# Reason: you can only set GH action concurrency on workflow or job level.
# Our current test setup requires a lot of steps.defaults:
# We want to have a separate workflow for account-level tests, so that we are sure, that there is only one instance across all active PRs.
# This will be deduplicated while working on better job definitions.

# Run secret-dependent integration tests only after /ok-to-test approval
name: Account-Level Tests

permissions:
  contents: read
  pull-requests: write
  checks: write

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs#example-only-cancel-in-progress-jobs-or-runs-for-the-current-workflow
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [ ok-to-test-command ]
  pull_request:
    branches:
      - main

jobs:
  account-level-tests:
    environment: test
    env:
      ## adding additional suffix to don't have conflict in non-account level tests and their pre-created objects
      TEST_SF_TF_TEST_OBJECT_SUFFIX: ${{ format('{0}{1}', ((github.event_name == 'repository_dispatch' && github.event.client_payload.pull_request.head.sha) || (github.event_name == 'pull_request' && github.event.pull_request.head.sha)), 'AL') }}
      TEST_SF_TF_TEST_WORKFLOW_ID: "${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.pull_request.head.sha) || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) }}_${{ github.run_attempt }}"
      ADDITIONAL_TEST_FLAGS: "-json"
    name: Run all account-level tests
    runs-on: ubuntu-latest
    if: (github.event_name == 'repository_dispatch') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Print object suffix
        run: |
          echo "$TEST_SF_TF_TEST_OBJECT_SUFFIX"
      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name != 'repository_dispatch'
        with:
          filters: |
            run_tests:
              - '.github/**'
              - 'pkg/**'
              - 'framework/**'
              - 'tools/**'
              - 'Makefile'
              - 'main.go'
              - 'go.mod'

      - name: Verify SHA input
        id: verify_sha_input
        if: github.event_name == 'repository_dispatch'
        env:
          PR_HEAD_SHA: ${{ github.event.client_payload.pull_request.head.sha }}
          SLASH_SHA: ${{ github.event.client_payload.slash_command.args.named.sha }}
          PR_HEAD_REPO: ${{ github.event.client_payload.pull_request.head.repo.full_name }}
          PR_HEAD_REF: ${{ github.event.client_payload.pull_request.head.ref }}
        run: |
          echo "$PR_HEAD_SHA"
          echo "$SLASH_SHA"
          echo "$PR_HEAD_REPO"
          echo "$PR_HEAD_REF"
          # Compare the full SHAs to bind the maintainer-reviewed commit to the code that is checked out.
          if [ "${PR_HEAD_SHA}" != "${SLASH_SHA}" ]; then echo "sha input from slash command does not equal the head sha" ; exit 1
          else echo "shas are equal"
          fi

      - name: Checkout Code (Repository Dispatch Event)
        id: checkout_dispatch
        if: (github.event_name == 'repository_dispatch')
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.slash_command.args.named.sha }}
          persist-credentials: false

      - name: Checkout Code (Pull Request Event)
        id: checkout_pr
        if: ${{ !cancelled() && (steps.changes.outputs.run_tests == 'true') && (github.event_name == 'pull_request') }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v4
        id: setup_go
        if: ${{ !cancelled() && (steps.checkout_pr.conclusion == 'success' || steps.checkout_dispatch.conclusion == 'success') }}
        with:
          go-version-file: ./go.mod
          cache: false

      - name: Apply masking
        if: ${{ !cancelled() && steps.setup_go.conclusion == 'success' }}
        run: |
          while IFS= read -r line || [[ -n $line ]]; do
            echo "::add-mask::$line"
          done < <(printf '%s' "$SF_TF_GH_MASKING")
        env:
          SF_TF_GH_MASKING: ${{ secrets.SF_TF_GH_MASKING }}

      - name: Generate random secret
        if: ${{ !cancelled() && steps.setup_go.conclusion == 'success' }}
        run: |
          random=$(openssl rand -hex 20)
          final_random="${TEST_SF_TF_RANDOM}${random}"
          echo "::add-mask::${final_random}"
          echo "TEST_SF_TF_GENERATED_RANDOM_VALUE=${final_random}" >> $GITHUB_ENV
        env:
          TEST_SF_TF_RANDOM: ${{ secrets.TEST_SF_TF_RANDOM }}

      - name: Install dependencies
        if: ${{ !cancelled() && steps.setup_go.conclusion == 'success' }}
        run: make dev-setup

      - name: Create and populate configuration files
        if: ${{ !cancelled() && steps.setup_go.conclusion == 'success' }}
        id: create_config
        run: |
          mkdir -p $HOME/.snowflake
          cd $HOME/.snowflake
          echo "${{ secrets.SNOWFLAKE_CONFIG_FILE }}" > ./config
          echo "${{ secrets.SNOWFLAKE_CONFIG_FILE_LEGACY }}" > ./config_legacy
          echo "${{ secrets.SNOWFLAKE_CONFIG_FILE_V097_COMPATIBLE_WITH_SERVICE_USER }}" > ./config_v097_compatible_with_service_user
          chmod 0600 ./config ./config_legacy ./config_v097_compatible_with_service_user

      - name: Setup Terraform
        if: ${{ !cancelled() && steps.create_config.conclusion == 'success' }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        id: setup_terraform
        with:
          terraform_version: 1.7.4
          terraform_wrapper: false

      - name: Run integration and acceptance account-level tests
        # pipefail needs to be set to ensure that the exit code of make test command is captured even when piped (otherwise it would take the exit code of make save-test-results)
        run: set -o pipefail && make test-account-level-features | make save-test-results
        if: ${{ !cancelled() && steps.setup_terraform.conclusion == 'success' }}
        env:
          TEST_SF_TF_TEST_TYPE: "account_level"
          SNOWFLAKE_BUSINESS_CRITICAL_ACCOUNT: ${{ secrets.SNOWFLAKE_BUSINESS_CRITICAL_ACCOUNT }}
          TEST_SF_TF_AWS_EXTERNAL_BUCKET_URL: ${{ secrets.TEST_SF_TF_AWS_EXTERNAL_BUCKET_URL }}
          TEST_SF_TF_AWS_EXTERNAL_KEY_ID: ${{ secrets.TEST_SF_TF_AWS_EXTERNAL_KEY_ID }}
          TEST_SF_TF_AWS_EXTERNAL_ROLE_ARN: ${{ secrets.TEST_SF_TF_AWS_EXTERNAL_ROLE_ARN }}
          TEST_SF_TF_AWS_EXTERNAL_SECRET_KEY: ${{ secrets.TEST_SF_TF_AWS_EXTERNAL_SECRET_KEY }}
          TEST_SF_TF_AZURE_EXTERNAL_BUCKET_URL: ${{ secrets.TEST_SF_TF_AZURE_EXTERNAL_BUCKET_URL }}
          TEST_SF_TF_AZURE_EXTERNAL_SAS_TOKEN: ${{ secrets.TEST_SF_TF_AZURE_EXTERNAL_SAS_TOKEN }}
          TEST_SF_TF_AZURE_EXTERNAL_TENANT_ID: ${{ secrets.TEST_SF_TF_AZURE_EXTERNAL_TENANT_ID }}
          TEST_SF_TF_GCS_EXTERNAL_BUCKET_URL: ${{ secrets.TEST_SF_TF_GCS_EXTERNAL_BUCKET_URL }}
          TF_VAR_V097_COMPATIBLE_PRIVATE_KEY: ${{ secrets.TF_VAR_V097_COMPATIBLE_PRIVATE_KEY }}
          TF_VAR_V097_COMPATIBLE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.TF_VAR_V097_COMPATIBLE_PRIVATE_KEY_PASSPHRASE }}

      - name: Create or update comment
        if: ${{ always() }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.client_payload.pull_request.number }}
          body: |
            Account-level tests ${{ job.status }} for [${{ github.event.client_payload.slash_command.args.named.sha || github.event.pull_request.head.sha }}](https://github.com/snowflakedb/terraform-provider-snowflake/actions/runs/${{ github.run_id }})

      # For fork PRs, tests run via repository_dispatch (triggered by /ok-to-test),
      # but the job check runs are tied to the default branch, not the fork PR SHA.
      # This step mirrors the job result onto the fork PR head SHA using a dedicated
      # synthetic check run that we own, reusing it across reruns to avoid duplicates.
      - name: Set fork job status
        uses: actions/github-script@v6
        if: ${{ always() }}
        id: update_check_run
        env:
          pr_number: ${{ github.event.client_payload.pull_request.number }}
          check_run_id: ${{ job.check_run_id }}
          # Conveniently, job.status maps to https://developer.github.com/v3/checks/runs/#update-a-check-run
          conclusion: ${{ job.status }}
          sha: ${{ github.event.client_payload.slash_command.args.named.sha }}
          event_name: ${{ github.event_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (process.env.event_name !== 'repository_dispatch') {
              console.log("Not repository_dispatch... nothing to do!");
              return process.env.event_name;
            }
            const { data: currentCheck } = await github.rest.checks.get({
              ...context.repo,
              check_run_id: parseInt(process.env.check_run_id)
            });
            const jobName = currentCheck.name;
            console.log(`Current job check run name: ${jobName}`);
            const ref = process.env.sha;
            const conclusion = process.env.conclusion;
            const externalId = `fork-pr-${process.env.pr_number}-${jobName}`;
            const output = {
              title: `Tests ${conclusion}`,
              summary: `Account-level tests ${conclusion}. See the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            };

            const { data: existingRuns } = await github.rest.checks.listForRef({
              ...context.repo,
              ref,
              check_name: jobName,
            });

            const existingRun = existingRuns.check_runs
              .filter((run) =>
                run.head_sha === ref &&
                run.name === jobName &&
                run.external_id === externalId
              )
              .sort((left, right) => {
                const leftDate = Math.max(new Date(left.started_at || 0).getTime(), new Date(left.completed_at || 0).getTime());
                const rightDate = Math.max(new Date(right.started_at || 0).getTime(), new Date(right.completed_at || 0).getTime());
                return rightDate - leftDate;
              })[0];

            let result;
            if (existingRun) {
              ({ data: result } = await github.rest.checks.update({
                ...context.repo,
                check_run_id: existingRun.id,
                status: 'completed',
                conclusion,
                external_id: externalId,
                output,
              }));
              console.log(`Updated check run ${existingRun.id}: ${conclusion} for "${jobName}" on ${ref}`);
            } else {
              ({ data: result } = await github.rest.checks.create({
                ...context.repo,
                name: jobName,
                head_sha: ref,
                status: 'completed',
                conclusion,
                external_id: externalId,
                output,
              }));
              console.log(`Created check run: ${conclusion} for "${jobName}" on ${ref}`);
            }
            return result;
